<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بوت زكي 🚀</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #0f0f0f; 
            color: white; 
            margin: 0; 
        }
        .card { 
            background: #1a1a1a; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            text-align: center; 
            width: 350px;
            border: 1px solid #333;
        }
        h2 { color: #007bff; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        button:hover { 
            background: #0056b3; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
        }
        button:active { transform: translateY(0); }
        button:disabled { 
            background: #444; 
            cursor: not-allowed; 
            box-shadow: none;
        }
        #status { 
            margin-top: 25px; 
            font-size: 15px; 
            padding: 10px;
            border-radius: 8px;
        }
        .success { color: #28a745; background: rgba(40, 167, 69, 0.1); }
        .error { color: #dc3545; background: rgba(220, 53, 69, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>التحكم في البوت</h2>
    <p>بوابتك الشخصية للنشر التلقائي</p>
    <button id="runBtn">🚀 تشغيل البوت الآن</button>
    <div id="status">جاهز للانطلاق...</div>
</div>

<script>
    // --- إعدادات زكي الخاصة ---
    const GITHUB_TOKEN = "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"; 
    const USERNAME = "beznikrichard-blip";
    const REPO_NAME = "bottagblog"; 
    // -----------------------

    document.getElementById('runBtn').addEventListener('click', async () => {
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "⏳ جاري إرسال الإشارة لـ GitHub...";
        status.className = "";

        try {
            const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO_NAME}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ event_type: 'manual_trigger' })
            });

            if (response.status === 204) {
                status.innerText = "✅ تم تشغيل البوت! جاري النشر الآن.";
                status.className = "success";
            } else {
                const errorData = await response.json();
                status.innerText = "❌ فشل: " + (errorData.message || "تأكد من الإعدادات");
                status.className = "error";
            }
        } catch (error) {
            status.innerText = "⚠️ خطأ في الاتصال بالسيرفر.";
            status.className = "error";
        }

        // إعادة تفعيل الزر بعد 10 ثوانٍ لمنع الضغط المتكرر
        setTimeout(() => { 
            btn.disabled = false; 
            status.innerText = "جاهز للتشغيل مرة أخرى";
            status.className = "";
        }, 10000);
    });
</script>

</body>
</html>
